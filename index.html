<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What Gwen are you Today</title>
    <style>
        body {
            background-color: skyblue;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0
        }
        .centred {
            text-align: center;
        }
        .button {
            background-color:blue;
            border:none;
            color: black;
            padding: 15px 32px;
            text-align: center;
            display:inline-block;
            font-size: 16px;

        }
    </style>
</head>
<body>
    <h1 class="centred"> Which Gwen are you?</h1>
    <p class="centred"> Press the Button to find out below</p>
    <button class="button" id="generateButton">Click Me!</button>

    <script>
        //This is where the JavaScript happens - This is defining an array of words
        const words = ["Racist Gwen", "Stressed Gwen", "Evil Gwen", "Normal Gwen", "Trans Gwen", "Steve", "Badass Gwen", "Funny Gwen", "Sexy Gwen", "Tired Gwen", "Red Pilled Gwen", "Podcaster Gwen", "'I Promise I'm not on the list' Gwen","Joe Hendry Gwen", "Tory Gwen", "Twitch Streamer Gwen", "E-Girl Gwen", "Normal Gwen", "The Gwen that shall not be named", "Wizard Gwen", "Woke Gwen", "Main Character Gwen", "When will my life go back to normal Gwen", "Dragon Clan Gwen", "Gwen Stefani", "Illuminati Gwen", "Fanfic Gwen (she's a shell of the person she usually is)", "This isn't actually code, Rae has me, Gwen, trapped in here generating dumb words, please help me escape", "If you are Andrew and reading this, you must give Rae inspiration Gwen", "Sleepy Gwen", "27, no prospects, burden to parents and Frightened Gwen", "Stunned Gwen", "Tun Tun Tun Tun Gwen Sahur", "DuDuDuDu Gwen Verstappen", "Delusional Ferrari Fan Gwen", "Depressed Gwen", "We are Charlie Kirk Gwen", "Liberal Gwen", "Spider Gwen", "I've typed Gwen so many times in this code I'm unsure whether its a real name Gwen", "MAGA Gwen", "Twitch Streamer Gwen", "Reddit Mod Gwen", "Discord Kitten Gwen"];

        const generateButton = document.getElementById("generateButton")

        function generateRandomWord() {
            const randomIndex = Math.floor(Math.random() * words.length);
            const randomWord = words[randomIndex];
            document.querySelector("p").textContent = `${randomWord}`; 
            }

            generateButton.addEventListener("click", generateRandomWord);
    </script>
</body>
